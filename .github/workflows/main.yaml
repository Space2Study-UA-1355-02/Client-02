name: CI

on:
  push:
    branches:
      - develop
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '*'

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: NPM Install
        run: npm install

      - name: Run Tests
        run: npm test

  sonar:
    name: SonarCloud Analysis
    needs: tests
    if: always() 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: NPM Install
        run: npm install

      - name: Generate sonar-project.properties
        run: |
          echo "sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}" > sonar-project.properties
          echo "sonar.organization=${{ secrets.SONAR_ORGANIZATION }}" >> sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties
          echo "sonar.exclusions=**/src/tests/**/*" >> sonar-project.properties
          echo "sonar.coverage.exclusions=**/src/tests/**/*" >> sonar-project.properties
          echo "sonar.tests=./src/tests" >> sonar-project.properties
          echo "sonar.sourceEncoding=UTF-8" >> sonar-project.properties

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Remove sonar-project.properties
        if: always()
        run: rm sonar-project.properties
